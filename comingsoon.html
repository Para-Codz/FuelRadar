<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelRadar - Coming Soon</title>


<link rel="icon" type="image/png" href="./images/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: #0f172a;
    color: #fff;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* Back Button */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:#1e293b;
    color:#3b82f6;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
    border:1px solid rgba(59,130,246,0.3);
}

.back-btn:hover{
    background:#3b82f6;
    color:#fff;
}

/* Blue Glow */
body::before, body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
}
body::before{
    background: radial-gradient(circle, rgba(59,130,246,0.25), transparent);
    top:-100px; left:-100px;
}
body::after{
    background: radial-gradient(circle, rgba(37,99,235,0.25), transparent);
    bottom:-100px; right:-100px;
}

.container{
    text-align:center;
    max-width:600px;
    padding:20px;
    z-index:2;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
}
.logo span{ color:#3b82f6; }

h1{ font-size:40px; margin-bottom:15px; }

p{ color:#94a3b8; margin-bottom:20px; }

.count{
    color:#3b82f6;
    font-weight:600;
    margin-bottom:20px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.box{
    background:#1e293b;
    padding:15px 20px;
    border-radius:10px;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#fff;
}

input::placeholder{
    color:#94a3b8;
}

button{
    background:#3b82f6;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#2563eb;
}

#message{ margin-top:10px; font-size:14px; }

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- Back Button -->
<a href="index.html" class="back-btn">← Back to Home</a>

<div class="container">
    <div class="logo">Fuel<span>Radar</span></div>

    <h1>Something Powerful is Coming ⛽</h1>

    <p>Find the cheapest fuel near you in seconds.</p>

    <div class="count" id="count">Loading...</div>

    <div class="countdown">
        <div class="box"><h2 id="days">00</h2><span>Days</span></div>
        <div class="box"><h2 id="hours">00</h2><span>Hours</span></div>
        <div class="box"><h2 id="minutes">00</h2><span>Minutes</span></div>
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Enter your email">
        <button id="submitBtn">Notify Me</button>
    </div>

    <p id="message"></p>

    <div class="footer">© 2026 FuelRadar</div>
</div>

<script src="./coming.js"></script>

</body>
</html>
