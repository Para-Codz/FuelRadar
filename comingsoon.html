<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelRadar - Coming Soon</title>

<link rel="icon" type="image/png" href="./images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== BODY (NO BLUE) ===== */
body{
    background: radial-gradient(circle at 20% 20%, #1c1917 0%, #0f172a 50%, #020617 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow-x:hidden;
}

/* ===== BACK BUTTON ===== */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(30,41,59,0.6);
    color:#f97316;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    border:1px solid rgba(249,115,22,0.3);
    backdrop-filter: blur(10px);
    transition:0.3s;
    z-index:10;
}

.back-btn:hover{
    background:#f97316;
    color:#fff;
}

/* ===== ORANGE GLOW ===== */
body::before, body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    border-radius:50%;
    pointer-events:none;
    z-index:0;
}

body::before{
    background: radial-gradient(circle, rgba(249,115,22,0.35), transparent 70%);
    top:-150px;
    left:-150px;
    filter: blur(50px);
}

body::after{
    background: radial-gradient(circle, rgba(234,88,12,0.35), transparent 70%);
    bottom:-150px;
    right:-150px;
    filter: blur(50px);
}

/* ===== CONTAINER ===== */
.container{
    text-align:center;
    max-width:600px;
    width:100%;
    padding:20px;
    z-index:2;
    position:relative;
}

/* ===== LOGO ===== */
.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
}
.logo span{
    color:#f97316;
    text-shadow:0 0 12px rgba(249,115,22,0.7);
}

/* ===== TEXT ===== */
h1{ 
    font-size:40px; 
    margin-bottom:15px; 
}

p{ 
    color:#94a3b8; 
    margin-bottom:20px; 
}

.count{
    color:#fb923c;
    font-weight:600;
    margin-bottom:20px;
}

/* ===== COUNTDOWN ===== */
.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.box{
    background:rgba(30,41,59,0.6);
    border:1px solid rgba(249,115,22,0.2);
    backdrop-filter: blur(10px);
    padding:15px 20px;
    border-radius:12px;
    min-width:100px;
}

.box h2{
    font-size:32px;
    color:#f97316;
}

.box span{
    font-size:14px;
    color:#94a3b8;
}

/* ===== INPUT ===== */
.input-group{
    display:flex;
    gap:10px;
    max-width:500px;
    margin:0 auto;
}

input{
    flex:1;
    padding:12px;
    border-radius:8px;
    background:rgba(30,41,59,0.7);
    border:1px solid rgba(249,115,22,0.2);
    color:#fff;
}

input::placeholder{
    color:#94a3b8;
}

input:focus{
    outline:none;
    border-color:#f97316;
    box-shadow:0 0 0 2px rgba(249,115,22,0.2);
}

/* ===== BUTTON ===== */
button{
    background: linear-gradient(135deg,#f97316,#ea580c);
    border:none;
    padding:12px 20px;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(249,115,22,0.4);
}

/* ===== FOOTER ===== */
.footer{
    margin-top:30px;
    color:#475569;
    font-size:14px;
}

/* ===== CONFETTI ===== */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 3s linear forwards;
    z-index:9999;
}
@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

/* ===== RESPONSIVE (UNCHANGED STRUCTURE) ===== */
@media(max-width:768px){
    body{
        padding:30px 20px;
        align-items:flex-start;
    }

    h1{
        font-size:32px;
    }

    .countdown{
        gap:15px;
        flex-wrap:wrap;
    }
}

@media(max-width:600px){
    .input-group{
        flex-direction:column;
    }

    input,button{
        width:100%;
    }
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Home</a>

<div class="container">
    <div class="logo">Fuel<span>Radar</span></div>

    <h1>Something Powerful is Coming ⛽</h1>

    <p>Find the cheapest fuel near you in seconds.</p>

    <div class="count" id="count">Loading...</div>

    <div class="countdown">
        <div class="box"><h2 id="days">00</h2><span>Days</span></div>
        <div class="box"><h2 id="hours">00</h2><span>Hours</span></div>
        <div class="box"><h2 id="minutes">00</h2><span>Minutes</span></div>
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Enter your email">
        <button id="submitBtn">Notify Me</button>
    </div>

    <p id="message"></p>

    <div class="footer">© 2026 FuelRadar</div>
</div>

<script src="./coming.js"></script>

</body>
</html>
