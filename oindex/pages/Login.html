<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuelRadar Login</title>

<link rel="icon" type="image/png" href="../images/favicon.png">

<link rel="stylesheet" href="../styles/login.css">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
/>

</head>

<body>

<div class="container">

<!-- LEFT IMAGE -->
<div class="left">

<div class="overlay">
<h1>FuelRadar</h1>
<p>Find real-time fuel prices near you</p>
</div>

</div>


<!-- RIGHT LOGIN -->
<div class="right">

    <a href="../index.html" class="back-home">
<i class="ph ph-arrow-left"></i>
Back to Home
</a>

<div class="login-box">

<h2>LOGIN</h2>
<p class="subtitle">Access your FuelRadar dashboard</p>

<form class="form" id="loginForm">

<div class="input">
<i class="ph ph-user"></i>
<input type="text" id="email" placeholder="Email">
</div>

<div class="input">
<i class="ph ph-lock"></i>
<input type="password" id="password" placeholder="Password">
</div>


<div class="forgot">
    <div><p style="font-size: 14px;">Don't have an account</p> <a href="./signin.html">Sign Up</a></div>
<a href="#">Forgot password?</a>
</div>

<button class="login-btn">Login Now</button>

</form>

<div class="divider">
<span>Login with Others</span>
</div>

<button class="social">
<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
Login with Google
</button>

<button class="social">
<img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
Login with Facebook
</button>



</div>

</div>

</div>

<script src="../script/login.js"></script>

</body>
</html>
